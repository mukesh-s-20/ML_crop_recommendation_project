<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}AgroMind – AI Crop Recommendation{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/style.css"/>
  {% block extra_css %}{% endblock %}
</head>
<body>

<!-- NAV -->
<nav class="navbar">
  <a href="/" class="nav-brand">
    <span class="brand-icon">🌾</span>
    <span class="brand-text">AgroMind</span>
  </a>
  <ul class="nav-links">
    <li><a href="/" class="nav-link {% if request.path=='/' %}active{% endif %}">Home</a></li>
    <li><a href="/predict" class="nav-link {% if request.path=='/predict' %}active{% endif %}">Predict</a></li>
    <li><a href="/dashboard" class="nav-link {% if request.path=='/dashboard' %}active{% endif %}">Dashboard</a></li>
    <li><a href="/about" class="nav-link {% if request.path=='/about' %}active{% endif %}">About</a></li>
  </ul>
  <button class="nav-toggle" id="navToggle">☰</button>
</nav>

<!-- MAIN CONTENT -->
<main>
  {% block content %}{% endblock %}
</main>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-inner">
    <p class="footer-title">🌾 AgroMind – AI Based Crop Recommendation System</p>
    <p class="footer-sub">B.Tech / MCA Final Year Project &nbsp;|&nbsp; Machine Learning &nbsp;|&nbsp; Deep Learning</p>
  </div>
</footer>

<script src="/static/js/main.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
